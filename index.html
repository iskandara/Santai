<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SANTAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Bebas+Neue&family=Courier+Prime&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f0;--fg:#0a0a0a;--mid:#888;--border:rgba(0,0,0,0.12)}
html,body{width:100%;height:100%;overflow:hidden;cursor:none;font-family:'Courier Prime',monospace;background:var(--bg);color:var(--fg)}

/* CURSOR */
#cursor{position:fixed;top:0;left:0;z-index:9999;width:10px;height:10px;background:var(--fg);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .25s,border .2s}
#cursor.drag{width:44px;height:44px;background:transparent;border:1.5px solid var(--fg)}
#cursor.press{width:5px;height:5px}

/* BG LAYERS */
#site-bg-layer{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;opacity:0;transition:opacity .7s;pointer-events:none}
#site-bg-layer.on{opacity:1}
#hold-bg-layer{position:fixed;inset:0;z-index:1;background-size:cover;background-position:center;opacity:0;transition:opacity .35s;pointer-events:none}
#hold-bg-layer.on{opacity:1}
#hold-color-layer{position:fixed;inset:0;z-index:1;opacity:0;transition:opacity .35s;pointer-events:none}
#hold-color-layer.on{opacity:1}

/* GRAIN */
.grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.032;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px}

/* LINES */
.line-l,.line-r{position:fixed;top:50%;transform:translateY(-50%);width:1px;height:38vh;background:linear-gradient(to bottom,transparent,var(--border) 40%,var(--border) 60%,transparent);z-index:5;pointer-events:none}
.line-l{left:40px}.line-r{right:40px}

/* HEADER — centered logo */
header{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:28px 48px;animation:fadeUp .9s .1s both}
.logo-wrap{display:flex;align-items:center;justify-content:center}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,3vw,34px);letter-spacing:.38em;line-height:1}
.logo-img{max-height:44px;max-width:180px;object-fit:contain;display:none}
.logo-img.show{display:block}

/* FOOTER */
footer{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:18px 48px 20px;animation:fadeUp .9s .5s both}
.avail-wrap{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--mid)}
.avail-dot{width:6px;height:6px;border-radius:50%;background:var(--fg);animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.dots{display:flex;gap:8px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--fg);opacity:.22;transition:opacity .3s,transform .3s;cursor:none}
.dot.active{opacity:1;transform:scale(1.5)}

/* STAGE */
.stage{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;animation:fadeUp 1.1s .3s both}
.swipe-cont{width:100%;height:100%;position:relative;overflow:hidden;display:flex;align-items:center}
.track{display:flex;align-items:center;height:100%;will-change:transform}
.slide{display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* SHIRT */
.shirt-wrap{position:relative;width:min(50vw,420px);aspect-ratio:3/4;user-select:none}
.shirt-img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;transition:filter .3s;filter:drop-shadow(0 20px 44px rgba(0,0,0,.13));will-change:transform}
.shirt-wrap.active .shirt-img{filter:drop-shadow(0 20px 44px rgba(0,0,0,.13)) brightness(.78)}
.ring{position:absolute;inset:-28px;border-radius:50%;border:1px dashed rgba(0,0,0,.13);pointer-events:none;opacity:0;transition:opacity .3s}
.shirt-wrap:hover .ring{opacity:1}
.deg-el{position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.2em;color:var(--mid);text-transform:uppercase;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.shirt-wrap.dragging .deg-el{opacity:1}

/* ARTICLE COUNTER — below shirt */
.art-counter{
  position:absolute;
  bottom:-52px;
  left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--mid);white-space:nowrap;pointer-events:none;
  transition:opacity .3s;
}
.shirt-wrap.dragging .art-counter{opacity:0}

/* DETAIL PANEL */
.detail-panel{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:26px;background:linear-gradient(to top,rgba(10,10,10,.83) 0%,rgba(10,10,10,0) 65%);opacity:0;pointer-events:none;transition:opacity .25s}
.shirt-wrap.active .detail-panel{opacity:1}
.p-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.25em;color:#f5f5f0;line-height:1;margin-bottom:4px}
.p-sub{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,245,240,.5);margin-bottom:14px}
.p-desc{font-family:'Cormorant Garamond',serif;font-size:13px;line-height:1.65;color:rgba(245,245,240,.85);margin-bottom:16px}
.sz{width:100%;border-collapse:collapse;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,245,240,.7)}
.sz th{border-bottom:1px solid rgba(245,245,240,.18);padding:5px 0;text-align:left;font-weight:normal;color:rgba(245,245,240,.38)}
.sz td{padding:5px 0;border-bottom:1px solid rgba(245,245,240,.07)}
.sz tr:last-child td{border-bottom:none}

/* TICKER */
.ticker-wrap{position:fixed;bottom:48px;left:0;right:0;z-index:150;overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 0;pointer-events:none}
.ticker-track{display:flex;gap:72px;animation:ticker 20s linear infinite;width:max-content}
.ticker-item{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--mid);white-space:nowrap}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════
   PASSWORD GATE
══════════════════════════════ */
#pw-gate{
  position:fixed;inset:0;z-index:1000;
  background:#0a0a0a;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:0;
}
#pw-gate.open{display:flex}
.pw-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.4em;color:#f5f5f0;margin-bottom:8px}
.pw-sub{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:#444;margin-bottom:48px}
.pw-field{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);
  color:#f5f5f0;padding:12px 18px;font-family:'Courier Prime',monospace;
  font-size:14px;outline:none;width:260px;text-align:center;letter-spacing:.15em;
  transition:border-color .2s;
}
.pw-field:focus{border-color:rgba(255,255,255,.5)}
.pw-btn{
  margin-top:14px;width:260px;padding:13px;
  background:#f5f5f0;color:#0a0a0a;border:none;
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.3em;
  cursor:pointer;transition:opacity .2s;
}
.pw-btn:hover{opacity:.8}
.pw-err{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#c0392b;margin-top:12px;opacity:0;transition:opacity .3s}
.pw-err.show{opacity:1}

/* ══════════════════════════════
   CMS PANEL
══════════════════════════════ */
#cms-overlay{position:fixed;inset:0;z-index:600;display:none;align-items:stretch}
#cms-overlay.open{display:flex}
#cms-backdrop{flex:1;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);cursor:none}
#cms-panel{width:min(440px,96vw);background:#0a0a0a;color:#f5f5f0;overflow-y:auto;padding:40px 36px 60px;animation:slideIn .35s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.cms-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px}
.cms-ttl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.3em}
.cms-x{background:none;border:none;color:#f5f5f0;font-size:20px;cursor:pointer;opacity:.5;transition:opacity .2s;font-family:'Courier Prime',monospace}
.cms-x:hover{opacity:1}
.cms-sec{margin-bottom:30px}
.cms-sec-lbl{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:#888;margin-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:8px}
.cms-fld{margin-bottom:14px}
.cms-fld label{display:block;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#888;margin-bottom:5px}
.cms-fld input[type=text],.cms-fld textarea,.cms-fld input[type=password]{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#f5f5f0;padding:9px 11px;font-family:'Courier Prime',monospace;font-size:12px;outline:none;resize:vertical;transition:border-color .2s}
.cms-fld input:focus,.cms-fld textarea:focus{border-color:rgba(255,255,255,.4)}
.up-btn{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px dashed rgba(255,255,255,.2);color:#f5f5f0;padding:11px 16px;font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;width:100%;justify-content:center;transition:background .2s,border-color .2s}
.up-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.4)}
.up-btn input{display:none}
.prev-thumb{width:100%;height:110px;object-fit:cover;margin-top:8px;border:1px solid rgba(255,255,255,.08);display:none}
.prev-thumb.show{display:block}
.art-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.art-tab{font-size:8px;letter-spacing:.2em;text-transform:uppercase;padding:5px 12px;border:1px solid rgba(255,255,255,.15);background:none;color:#888;cursor:pointer;transition:all .2s}
.art-tab.active{background:#f5f5f0;color:#0a0a0a;border-color:#f5f5f0}
.add-art-btn{width:100%;padding:9px;background:none;color:#888;border:1px dashed rgba(255,255,255,.15);font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-bottom:16px}
.add-art-btn:hover{color:#f5f5f0;border-color:rgba(255,255,255,.4)}
.save-btn{width:100%;padding:13px;background:#f5f5f0;color:#0a0a0a;border:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.3em;cursor:pointer;transition:opacity .2s;margin-top:6px}
.save-btn:hover{opacity:.8}
.del-art-btn{width:100%;padding:10px;background:none;color:#c0392b;border:1px solid rgba(192,57,43,.3);font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:8px}
.del-art-btn:hover{background:rgba(192,57,43,.12);border-color:#c0392b}
.save-confirm{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#2ecc71;text-align:center;margin-top:10px;opacity:0;transition:opacity .4s}
.save-confirm.show{opacity:1}
/* change-pw row */
.pw-row{display:flex;gap:8px;align-items:flex-end}
.pw-row .cms-fld{flex:1;margin-bottom:0}
.pw-change-btn{padding:9px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#f5f5f0;font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.pw-change-btn:hover{background:rgba(255,255,255,.15)}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="site-bg-layer"></div>
<div id="hold-bg-layer"></div>
<div id="hold-color-layer"></div>
<div class="grain"></div>
<div class="line-l"></div>
<div class="line-r"></div>

<!-- HEADER — centered logo -->
<header>
  <div class="logo-wrap">
    <img class="logo-img" id="logoImg" src="" alt="SANTAI"/>
    <div class="logo-text" id="logoText">SANTAI</div>
  </div>
</header>

<!-- STAGE -->
<div class="stage">
  <div class="swipe-cont" id="swipeCont">
    <div class="track" id="track"></div>
  </div>
</div>

<!-- TICKER -->
<div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>

<!-- FOOTER -->
<footer>
  <div class="avail-wrap"><div class="avail-dot"></div><span id="availTxt">Available Now</span></div>
  <div class="dots" id="dotsEl"></div>
</footer>

<!-- PASSWORD GATE -->
<div id="pw-gate">
  <div class="pw-logo">SANTAI</div>
  <div class="pw-sub">CMS — Editor Access</div>
  <input class="pw-field" id="pw-input" type="password" placeholder="Enter password" autocomplete="off"/>
  <button class="pw-btn" id="pw-submit">ENTER</button>
  <div class="pw-err" id="pw-err">Incorrect password</div>
</div>

<!-- CMS PANEL -->
<div id="cms-overlay">
  <div id="cms-backdrop"></div>
  <div id="cms-panel">
    <div class="cms-hdr">
      <div class="cms-ttl">SANTAI CMS</div>
      <button class="cms-x" id="cms-x">✕</button>
    </div>

    <!-- GLOBAL -->
    <div class="cms-sec">
      <div class="cms-sec-lbl">Global Settings</div>
      <div class="cms-fld">
        <label>Site Logo (image replaces text)</label>
        <label class="up-btn">↑ Upload Logo<input type="file" id="f-logo" accept="image/*"></label>
        <img class="prev-thumb" id="pv-logo"/>
        <button class="del-art-btn" id="remove-logo-btn" style="margin-top:6px;color:#888;border-color:rgba(255,255,255,.15)">✕ Remove Logo / Use Text</button>
      </div>
      <div class="cms-fld"><label>Available Now Text</label><input type="text" id="g-avail" value="Available Now"/></div>
      <div class="cms-fld"><label>Running Text (separate items with |)</label><textarea id="g-ticker" rows="3">Santai SS25 — Drop 01|One Shirt. One Season. No Restock.|340gsm Japanese Poplin|Limited to 50 Pieces|Drag to Rotate — Hold to Inspect</textarea></div>
      <div class="cms-fld">
        <label>Site Background Image</label>
        <label class="up-btn">↑ Upload Site Background<input type="file" id="f-site-bg" accept="image/*"></label>
        <img class="prev-thumb" id="pv-site-bg"/>
      </div>
    </div>

    <!-- CHANGE PASSWORD -->
    <div class="cms-sec">
      <div class="cms-sec-lbl">Change CMS Password</div>
      <div class="pw-row">
        <div class="cms-fld"><label>New Password</label><input type="password" id="g-new-pw" placeholder="New password"/></div>
        <button class="pw-change-btn" id="change-pw-btn">Update</button>
      </div>
    </div>

    <!-- ARTICLES -->
    <div class="cms-sec">
      <div class="cms-sec-lbl">Articles</div>
      <div class="art-tabs" id="artTabs"></div>
      <button class="add-art-btn" id="addArtBtn">+ Add Article</button>
      <div id="artEditor">
        <div class="cms-fld"><label>Shirt Name</label><input type="text" id="a-name"/></div>
        <div class="cms-fld"><label>Subtitle</label><input type="text" id="a-sub"/></div>
        <div class="cms-fld"><label>Description</label><textarea id="a-desc" rows="3"></textarea></div>
        <div class="cms-fld">
          <label>Shirt Image</label>
          <label class="up-btn">↑ Upload Shirt Image<input type="file" id="f-shirt" accept="image/*"></label>
          <img class="prev-thumb" id="pv-shirt"/>
        </div>
        <div class="cms-fld">
          <label>Hold Background Image</label>
          <label class="up-btn">↑ Upload Hold Background<input type="file" id="f-hold-bg" accept="image/*"></label>
          <img class="prev-thumb" id="pv-hold-bg"/>
        </div>
        <div class="cms-fld"><label>Hold Background Color (fallback, e.g. #1a1a2e)</label><input type="text" id="a-hold-color" placeholder="#1a1a2e"/></div>
        <div class="cms-fld"><label>Size Chart (S,chest,length,shoulder — one per line)</label><textarea id="a-sizes" rows="4">S,104,72,48
M,110,75,51
L,116,78,54
XL,122,81,57</textarea></div>
        <button class="save-btn" id="saveArtBtn">SAVE ALL CHANGES</button>
        <div class="save-confirm" id="save-confirm">✓ Saved & applied</div>
        <button class="del-art-btn" id="delArtBtn">✕ Delete This Article</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════
   PERSISTENCE — localStorage
══════════════════════════════════ */
const LS_KEY = 'santai_store_v2';
const PW_KEY  = 'santai_cms_pw';

const DEFAULT_STORE = {
  availText:'Available Now',
  ticker:'Santai SS25 — Drop 01|One Shirt. One Season. No Restock.|340gsm Japanese Poplin|Limited to 50 Pieces|Drag to Rotate — Hold to Inspect',
  siteBg:null,
  logoImg:null,
  articles:[{
    id:1,name:'The Void Shirt',sub:'SS25 — Drop 01 — Ltd. 50 pcs',
    desc:'Heavyweight 340gsm poplin. Tonal embroidery at chest. Garment-washed for a lived-in drape. Oversized silhouette with dropped shoulders.',
    shirtImg:null,holdBg:null,holdColor:'#1a1a2e',
    sizes:[{s:'S',c:'104',l:'72',sh:'48'},{s:'M',c:'110',l:'75',sh:'51'},{s:'L',c:'116',l:'78',sh:'54'},{s:'XL',c:'122',l:'81',sh:'57'}]
  }]
};

function loadStore(){
  try{ const s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_STORE)); }
  catch(e){ return JSON.parse(JSON.stringify(DEFAULT_STORE)); }
}
function saveStore(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(store)); }catch(e){} }
function getPassword(){ return localStorage.getItem(PW_KEY)||'santai2025'; }
function setPassword(pw){ localStorage.setItem(PW_KEY,pw); }

let store = loadStore();
let curIdx = 0, cmsIdx = 0;

/* ══════════════════════════════════
   CURSOR
══════════════════════════════════ */
const cur=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{ cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });

/* ══════════════════════════════════
   CMS ROUTE — #CMSedit
══════════════════════════════════ */
function checkRoute(){
  if(window.location.hash==='#CMSedit'){
    document.getElementById('pw-gate').classList.add('open');
  } else {
    document.getElementById('pw-gate').classList.remove('open');
  }
}
window.addEventListener('hashchange', checkRoute);
checkRoute();

document.getElementById('pw-submit').addEventListener('click', tryLogin);
document.getElementById('pw-input').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });

function tryLogin(){
  const val = document.getElementById('pw-input').value;
  if(val === getPassword()){
    document.getElementById('pw-gate').classList.remove('open');
    document.getElementById('pw-input').value='';
    document.getElementById('pw-err').classList.remove('show');
    openCMS();
  } else {
    document.getElementById('pw-err').classList.add('show');
    document.getElementById('pw-input').value='';
    setTimeout(()=>document.getElementById('pw-err').classList.remove('show'),2400);
  }
}

/* ══════════════════════════════════
   LAYERS
══════════════════════════════════ */
const siteBgLayer   = document.getElementById('site-bg-layer');
const holdBgLayer   = document.getElementById('hold-bg-layer');
const holdColorLayer= document.getElementById('hold-color-layer');

function showHoldBg(art){
  if(art.holdBg){ holdBgLayer.style.backgroundImage=`url(${art.holdBg})`; holdBgLayer.classList.add('on'); holdColorLayer.classList.remove('on'); }
  else if(art.holdColor){ holdColorLayer.style.background=art.holdColor; holdColorLayer.classList.add('on'); holdBgLayer.classList.remove('on'); }
}
function hideHoldBg(){ holdBgLayer.classList.remove('on'); holdColorLayer.classList.remove('on'); }

/* ══════════════════════════════════
   SVG FALLBACK SHIRT
══════════════════════════════════ */
function svgShirt(){
  return `<svg class="shirt-img" viewBox="0 0 340 420" xmlns="http://www.w3.org/2000/svg">
    <defs><filter id="shf"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-opacity=".1"/></filter></defs>
    <path d="M90 90 L60 160 L30 155 L50 240 L90 235 L90 380 L250 380 L250 235 L290 240 L310 155 L280 160 L250 90 L220 70 Q170 50 120 70 Z" fill="#f5f5f0" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round" filter="url(#shf)"/>
    <path d="M140 70 Q170 95 200 70" fill="none" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
    <path d="M90 90 L60 160" fill="none" stroke="#0a0a0a" stroke-width="1" stroke-dasharray="4 3" opacity=".3"/>
    <path d="M250 90 L280 160" fill="none" stroke="#0a0a0a" stroke-width="1" stroke-dasharray="4 3" opacity=".3"/>
    <rect x="114" y="148" width="36" height="28" rx="1" fill="none" stroke="#0a0a0a" stroke-width="1.2" opacity=".5"/>
    <line x1="170" y1="100" x2="170" y2="380" stroke="#0a0a0a" stroke-width=".6" stroke-dasharray="3 5" opacity=".18"/>
    <text x="170" y="310" text-anchor="middle" font-family="Bebas Neue,sans-serif" font-size="18" letter-spacing="8" fill="#0a0a0a" opacity=".07">SANTAI</text>
  </svg>`;
}

function szTable(sizes){
  if(!sizes||!sizes.length) return '';
  return `<table class="sz"><thead><tr><th>Size</th><th>Chest</th><th>Length</th><th>Shoulder</th></tr></thead><tbody>${sizes.map(r=>`<tr><td>${r.s}</td><td>${r.c} cm</td><td>${r.l} cm</td><td>${r.sh} cm</td></tr>`).join('')}</tbody></table>`;
}

/* ══════════════════════════════════
   RENDER TRACK
══════════════════════════════════ */
const trackEl=document.getElementById('track');

function renderTrack(){
  trackEl.innerHTML='';
  const W=window.innerWidth, total=store.articles.length;
  store.articles.forEach((art,i)=>{
    const slide=document.createElement('div');
    slide.className='slide';
    slide.style.cssText=`width:${W}px;min-width:${W}px;max-width:${W}px;height:100vh`;

    const wrap=document.createElement('div');
    wrap.className='shirt-wrap';

    if(art.shirtImg){ const img=document.createElement('img'); img.className='shirt-img'; img.src=art.shirtImg; img.draggable=false; wrap.appendChild(img); }
    else wrap.insertAdjacentHTML('beforeend',svgShirt());

    // article counter below shirt
    const artNum=document.createElement('div');
    artNum.className='art-counter';
    artNum.textContent=String(i+1).padStart(3,'0')+' / '+String(total).padStart(3,'0');

    wrap.insertAdjacentHTML('beforeend',`
      <div class="ring"></div>
      <span class="deg-el">0°</span>
      <div class="detail-panel">
        <div class="p-title">${art.name||'Untitled'}</div>
        <div class="p-sub">${art.sub||''}</div>
        <p class="p-desc">${art.desc||''}</p>
        ${szTable(art.sizes)}
      </div>`);
    wrap.appendChild(artNum);

    slide.appendChild(wrap);
    trackEl.appendChild(slide);
    attachShirt(wrap,art);
  });
  setTrackPos(false);
  renderDots();
  updateCounter();
}

/* ══════════════════════════════════
   SHIRT — rotation + hold
══════════════════════════════════ */
function attachShirt(wrap,art){
  let dragging=false,held=false,sx=0,deg=0,htimer=null;
  const img=wrap.querySelector('.shirt-img');
  const degEl=wrap.querySelector('.deg-el');

  function applyRot(d){
    const n=((d%360)+360)%360, rad=(n*Math.PI)/180;
    const cx=Math.cos(rad),ab=Math.abs(cx);
    img.style.transform=`scaleX(${cx<0?-ab:ab}) skewY(${Math.sin(rad)*5}deg)`;
    degEl.textContent=Math.round(n)+'°';
  }
  function startHold(){ held=true; wrap.classList.add('active'); showHoldBg(art); cur.classList.add('press'); }
  function endHold(){ held=false; wrap.classList.remove('active'); hideHoldBg(); cur.classList.remove('press'); }
  function beginDrag(x){ dragging=true; sx=x; wrap.classList.add('dragging'); cur.classList.add('drag'); htimer=setTimeout(startHold,200); }
  function moveDrag(x){ if(!dragging) return; const d=x-sx; sx=x; deg+=d*.55; applyRot(deg); }
  function endDrag(){ clearTimeout(htimer); dragging=false; wrap.classList.remove('dragging'); cur.classList.remove('drag'); endHold(); }

  wrap.addEventListener('mousedown',e=>{ e.stopPropagation(); beginDrag(e.clientX); });
  document.addEventListener('mousemove',e=>moveDrag(e.clientX));
  document.addEventListener('mouseup',endDrag);
  wrap.addEventListener('mouseenter',()=>{ if(!dragging) cur.classList.add('drag'); });
  wrap.addEventListener('mouseleave',()=>{ if(!dragging) cur.classList.remove('drag'); });
  wrap.addEventListener('touchstart',e=>{ e.stopPropagation(); beginDrag(e.touches[0].clientX); },{passive:true});
  wrap.addEventListener('touchmove',e=>{ moveDrag(e.touches[0].clientX); e.preventDefault(); },{passive:false});
  wrap.addEventListener('touchend',endDrag);
}

/* ══════════════════════════════════
   NAVIGATION
══════════════════════════════════ */
function setTrackPos(anim){
  const W=window.innerWidth;
  if(anim){ trackEl.style.transition='transform .55s cubic-bezier(.25,.46,.45,.94)'; setTimeout(()=>trackEl.style.transition='none',600); }
  else trackEl.style.transition='none';
  trackEl.style.transform=`translateX(-${curIdx*W}px)`;
}
function goTo(i,anim=true){
  if(i<0||i>=store.articles.length) return;
  curIdx=i; setTrackPos(anim); renderDots(); updateCounter();
}
function renderDots(){
  const el=document.getElementById('dotsEl'); el.innerHTML='';
  if(store.articles.length<=1) return;
  store.articles.forEach((_,i)=>{ const d=document.createElement('div'); d.className='dot'+(i===curIdx?' active':''); d.addEventListener('click',()=>goTo(i)); el.appendChild(d); });
}
function updateCounter(){
  // counter is now on each shirt-wrap, rendered in renderTrack
}

// swipe on background
let swSX=0,swDX=0,swSY=0,swLocked=false;
const sc=document.getElementById('swipeCont');
sc.addEventListener('mousedown',e=>{ if(e.target.closest('.shirt-wrap')) return; swSX=e.clientX; swDX=0; });
document.addEventListener('mousemove',e=>{ if(!swSX||e.target.closest('.shirt-wrap')) return; swDX=e.clientX-swSX; });
document.addEventListener('mouseup',()=>{ if(!swSX) return; if(Math.abs(swDX)>60){ swDX<0?goTo(curIdx+1):goTo(curIdx-1); } swSX=0;swDX=0; });
sc.addEventListener('touchstart',e=>{ if(e.target.closest('.shirt-wrap')) return; swSX=e.touches[0].clientX; swSY=e.touches[0].clientY; swLocked=false; swDX=0; },{passive:true});
sc.addEventListener('touchmove',e=>{ if(!swSX||e.target.closest('.shirt-wrap')) return; const dx=e.touches[0].clientX-swSX,dy=e.touches[0].clientY-swSY; if(!swLocked){ swLocked=true; if(Math.abs(dy)>Math.abs(dx)){ swSX=0; return; } } swDX=dx; },{passive:true});
sc.addEventListener('touchend',()=>{ if(!swSX) return; if(Math.abs(swDX)>60){ swDX<0?goTo(curIdx+1):goTo(curIdx-1); } swSX=0;swDX=0; });
document.addEventListener('keydown',e=>{ e.key==='ArrowRight'&&goTo(curIdx+1); e.key==='ArrowLeft'&&goTo(curIdx-1); });
window.addEventListener('resize',()=>{ const W=window.innerWidth; document.querySelectorAll('.slide').forEach(s=>{ s.style.width=W+'px'; s.style.minWidth=W+'px'; s.style.maxWidth=W+'px'; }); setTrackPos(false); });

/* ══════════════════════════════════
   APPLY GLOBAL SETTINGS
══════════════════════════════════ */
function applyGlobal(){
  document.getElementById('availTxt').textContent=store.availText;

  // Logo
  const logoImg=document.getElementById('logoImg');
  const logoText=document.getElementById('logoText');
  if(store.logoImg){
    logoImg.src=store.logoImg; logoImg.classList.add('show'); logoText.style.display='none';
  } else {
    logoImg.classList.remove('show'); logoText.style.display='';
  }

  // Ticker
  const items=store.ticker.split('|').filter(Boolean);
  const dbl=[...items,...items];
  document.getElementById('tickerTrack').innerHTML=dbl.map(t=>`<span class="ticker-item">${t}</span>`).join('');

  // Site BG
  if(store.siteBg){ siteBgLayer.style.backgroundImage=`url(${store.siteBg})`; siteBgLayer.classList.add('on'); }
  else siteBgLayer.classList.remove('on');
}

/* ══════════════════════════════════
   CMS
══════════════════════════════════ */
const cmsOv=document.getElementById('cms-overlay');
document.getElementById('cms-x').addEventListener('click',closeCMS);
document.getElementById('cms-backdrop').addEventListener('click',closeCMS);

function openCMS(){
  cmsOv.classList.add('open');
  document.getElementById('g-avail').value=store.availText;
  document.getElementById('g-ticker').value=store.ticker;
  document.getElementById('g-new-pw').value='';
  const psb=document.getElementById('pv-site-bg');
  store.siteBg?(psb.src=store.siteBg,psb.classList.add('show')):(psb.src='',psb.classList.remove('show'));
  const pLogo=document.getElementById('pv-logo');
  store.logoImg?(pLogo.src=store.logoImg,pLogo.classList.add('show')):(pLogo.src='',pLogo.classList.remove('show'));
  renderTabs(); loadEditor(cmsIdx);
}
function closeCMS(){
  cmsOv.classList.remove('open');
  window.location.hash='';
}

function renderTabs(){
  const el=document.getElementById('artTabs'); el.innerHTML='';
  store.articles.forEach((art,i)=>{
    const b=document.createElement('button'); b.className='art-tab'+(i===cmsIdx?' active':'');
    b.textContent=`#${i+1} ${art.name||'Untitled'}`;
    b.addEventListener('click',()=>{ cmsIdx=i; renderTabs(); loadEditor(i); }); el.appendChild(b);
  });
}
function loadEditor(i){
  const art=store.articles[i]; if(!art) return;
  document.getElementById('a-name').value=art.name||'';
  document.getElementById('a-sub').value=art.sub||'';
  document.getElementById('a-desc').value=art.desc||'';
  document.getElementById('a-hold-color').value=art.holdColor||'';
  document.getElementById('a-sizes').value=(art.sizes||[]).map(r=>`${r.s},${r.c},${r.l},${r.sh}`).join('\n');
  const ps=document.getElementById('pv-shirt');
  art.shirtImg?(ps.src=art.shirtImg,ps.classList.add('show')):(ps.src='',ps.classList.remove('show'));
  const phb=document.getElementById('pv-hold-bg');
  art.holdBg?(phb.src=art.holdBg,phb.classList.add('show')):(phb.src='',phb.classList.remove('show'));
}

function fileB64(file,cb){ const r=new FileReader(); r.onload=e=>cb(e.target.result); r.readAsDataURL(file); }

// Logo upload
document.getElementById('f-logo').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  fileB64(f,b=>{ store.logoImg=b; const p=document.getElementById('pv-logo'); p.src=b; p.classList.add('show'); });
});
document.getElementById('remove-logo-btn').addEventListener('click',()=>{
  store.logoImg=null;
  const p=document.getElementById('pv-logo'); p.src=''; p.classList.remove('show');
});

// File uploads
document.getElementById('f-shirt').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f) return; fileB64(f,b=>{ store.articles[cmsIdx].shirtImg=b; const p=document.getElementById('pv-shirt'); p.src=b; p.classList.add('show'); }); });
document.getElementById('f-hold-bg').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f) return; fileB64(f,b=>{ store.articles[cmsIdx].holdBg=b; const p=document.getElementById('pv-hold-bg'); p.src=b; p.classList.add('show'); }); });
document.getElementById('f-site-bg').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f) return; fileB64(f,b=>{ store.siteBg=b; const p=document.getElementById('pv-site-bg'); p.src=b; p.classList.add('show'); siteBgLayer.style.backgroundImage=`url(${b})`; siteBgLayer.classList.add('on'); }); });

// Add article
document.getElementById('addArtBtn').addEventListener('click',()=>{
  store.articles.push({id:Date.now(),name:'New Shirt',sub:'',desc:'',shirtImg:null,holdBg:null,holdColor:'#111',sizes:[{s:'S',c:'104',l:'72',sh:'48'}]});
  cmsIdx=store.articles.length-1; renderTabs(); loadEditor(cmsIdx); renderTrack();
});

// Delete article
document.getElementById('delArtBtn').addEventListener('click',()=>{
  if(store.articles.length<=1){ alert('You must have at least one article.'); return; }
  if(!confirm(`Delete "${store.articles[cmsIdx].name}"? This cannot be undone.`)) return;
  store.articles.splice(cmsIdx,1);
  cmsIdx=Math.max(0,cmsIdx-1);
  if(curIdx>=store.articles.length) curIdx=store.articles.length-1;
  saveStore(); renderTabs(); loadEditor(cmsIdx); renderTrack();
});

// Change password
document.getElementById('change-pw-btn').addEventListener('click',()=>{
  const np=document.getElementById('g-new-pw').value.trim();
  if(!np){ alert('Please enter a new password.'); return; }
  setPassword(np);
  document.getElementById('g-new-pw').value='';
  alert('Password updated.');
});

// SAVE ALL
document.getElementById('saveArtBtn').addEventListener('click',()=>{
  // Save current article editor fields
  const art=store.articles[cmsIdx];
  art.name=document.getElementById('a-name').value;
  art.sub=document.getElementById('a-sub').value;
  art.desc=document.getElementById('a-desc').value;
  art.holdColor=document.getElementById('a-hold-color').value;
  art.sizes=document.getElementById('a-sizes').value.trim().split('\n').filter(Boolean).map(l=>{
    const[s,c,le,sh]=l.split(',').map(x=>x.trim()); return{s,c,l:le,sh};
  });
  // Global
  store.availText=document.getElementById('g-avail').value;
  store.ticker=document.getElementById('g-ticker').value;

  // Persist to localStorage
  saveStore();
  applyGlobal();
  renderTrack();
  renderTabs();

  // Confirm flash
  const conf=document.getElementById('save-confirm');
  conf.classList.add('show');
  setTimeout(()=>conf.classList.remove('show'),2500);
});

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
applyGlobal();
renderTrack();
</script>
